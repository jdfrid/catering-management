services:
  - type: web
    name: catering-management
    runtime: node
    plan: free
    region: frankfurt
    # מיגרציה לפני generate/build — מבטיח ש-Render תמיד תואם לסכמה (גם אם preDeploy לא רץ).
    buildCommand: npm ci && npm run prisma:deploy && npm run prisma:generate && npm run build
    preDeployCommand: npm run prisma:deploy
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: catering-management-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_NAME
        value: מערכת ניהול קייטרינג
      - key: EMAIL_FROM
        sync: false

databases:
  - name: catering-management-db
    plan: free
    region: frankfurt
    databaseName: catering_management
    user: catering_app
